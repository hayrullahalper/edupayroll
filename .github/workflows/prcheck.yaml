name: check on pr

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
    paths:
      - 'packages/api/**'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Start MySQL
        uses: mirromutth/mysql-action@v1.1
        with:
          host port: 3307
          container port: 3306
          mysql database: 'app'
          mysql user: 'user'
          mysql password: 'secret'
          mysql root password: 'secret'

      - name: Install Maven dependencies
        run: mvn install -DskipTests
        working-directory: packages/api

      - name: Run Spotless check
        run: mvn spotless:check
        working-directory: packages/api

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -P3307 -uuser -psecret --silent; then
              echo "MySQL is ready!"
              exit 0
            fi
            echo "Waiting for MySQL to be ready... ($i/30)"
            sleep 10
          done
          echo "MySQL failed to become ready"
          exit 1

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3307/app
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: secret
        run: mvn test
        working-directory: packages/api

      - name: Build project
        run: mvn clean package
        working-directory: packages/api
